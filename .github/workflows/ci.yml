name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'feature/*', 'claude/*']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install flake8 black isort mypy

      - name: Check code formatting (Black)
        run: |
          black --check --diff .
        continue-on-error: true

      - name: Check import sorting (isort)
        run: |
          isort --check-only --diff .
        continue-on-error: true

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings for other issues
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov aiohttp beautifulsoup4 lxml
          pip install sentence-transformers faiss-cpu anthropic
          pip install qbittorrent-api tenacity ratelimit
          pip install pydantic pydantic-settings
          pip install sqlalchemy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run unit tests
        run: |
          python -m pytest test_gap_analyzer.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run MAM crawler tests
        run: |
          python -m pytest test_mam_crawler.py -v --tb=short
        continue-on-error: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio aiohttp beautifulsoup4 lxml
          pip install qbittorrent-api tenacity ratelimit
          pip install pydantic pydantic-settings sqlalchemy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run E2E integration tests
        run: |
          python test_e2e_integration.py
        env:
          PYTHONPATH: ${{ github.workspace }}

  validate-config:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pydantic pydantic-settings

      - name: Validate configuration schema
        run: |
          python -c "
          from backend.config import Settings
          # This will fail if there are schema issues
          settings = Settings()
          print('Configuration schema is valid')
          print(f'  API_VERSION: {settings.API_VERSION}')
          print(f'  DATABASE_URL pattern: {settings.DATABASE_URL[:20]}...')
          print(f'  GAP_ANALYSIS_ENABLED: {settings.GAP_ANALYSIS_ENABLED}')
          "
        env:
          PYTHONPATH: ${{ github.workspace }}

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: [test, integration]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pydantic-settings sqlalchemy aiohttp
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify imports
        run: |
          python -c "
          print('Verifying core module imports...')

          # Core modules
          from backend.config import get_settings
          print('  ✓ backend.config')

          from backend.database import Base, get_db
          print('  ✓ backend.database')

          from audiobook_gap_analyzer import AudiobookGapAnalyzer
          print('  ✓ audiobook_gap_analyzer')

          # Utils
          from backend.utils.backup import DatabaseBackup
          print('  ✓ backend.utils.backup')

          print('All imports successful!')
          "
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Generate build info
        run: |
          echo "Build completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit security scan
        run: |
          bandit -r backend/ audiobook_gap_analyzer.py -ll -ii
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt --full-report
          else
            echo "No requirements.txt found, skipping safety check"
          fi
        continue-on-error: true

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, integration, build]
    if: failure()
    steps:
      - name: Create failure summary
        run: |
          echo "## CI Pipeline Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "One or more jobs failed. Please check the logs for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
